<!DOCTYPE html>
<html lang="zh-CN">
<head>
<!-- 文档字符编码 -->
<meta charset="UTF-8">
<!-- 视口设置，用于响应式设计 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 页面标题 -->
<title>FVM 空气动力学模拟器 - 远程串流</title>
<style>
    /* 重置所有元素的默认边距、填充和盒模型 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* 设置html和body全屏，隐藏溢出内容，黑色背景 */
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    
    /* 容器：全屏弹性布局，用于居中内容 */
    #container {
        width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        position: relative;
    }
    
    /* 视频元素：全屏显示，保持宽高比，黑色背景 */
    video {
        width: 100%; height: 100%;
        object-fit: contain; background: #000;
        cursor: default;
    }
    
    /* 信息覆盖层：左上角显示状态信息，绿色文字，半透明黑色背景 */
    #overlay {
        position: absolute; top: 10px; left: 10px;
        color: #0f0; font-family: monospace; font-size: 13px;
        background: rgba(0,0,0,0.55); padding: 6px 10px; border-radius: 4px;
        pointer-events: none; user-select: none; z-index: 10;
    }
    
    /* 状态提示：屏幕中央显示连接状态 */
    #status {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        color: #aaa; font-family: sans-serif; font-size: 18px; text-align: center;
        z-index: 20;
    }
    
    /* 隐藏状态提示 */
    #status.hidden { display: none; }
</style>
</head>
<body>
<!-- 主容器 -->
<div id="container">
    <!-- 视频播放元素 -->
    <video id="video" autoplay playsinline muted></video>
    <!-- 信息覆盖层 -->
    <div id="overlay"></div>
    <!-- 连接状态提示 -->
    <div id="status">正在连接...</div>
</div>

<!-- 引入流媒体处理脚本 -->
<script src="stream.js"></script>
</body>
</html>
