<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FVM 空气动力学模拟器 - 远程串流</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
  #container {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  video {
    width: 100%; height: 100%;
    object-fit: contain; background: #000;
    cursor: default;
  }
  #overlay {
    position: absolute; top: 10px; left: 10px;
    color: #0f0; font-family: monospace; font-size: 13px;
    background: rgba(0,0,0,0.55); padding: 6px 10px; border-radius: 4px;
    pointer-events: none; user-select: none; z-index: 10;
  }
  #status {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #aaa; font-family: sans-serif; font-size: 18px; text-align: center;
    z-index: 20;
  }
  #status.hidden { display: none; }
</style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay"></div>
  <div id="status">正在连接...</div>
</div>
<script src="stream.js"></script>
</body>
</html>
